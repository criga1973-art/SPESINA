<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body style="text-align:center; font-family:sans-serif;">
    <h3>Scanner Pronto</h3>
    <div id="reader" style="width:300px; margin:auto; background:#eee; min-height:200px;"></div>
    <button onclick="start()" style="padding:15px; margin:10px;">1. ACCENDI FOTOCAMERA</button>
    <input type="text" id="ean" style="padding:10px; width:80%; margin:10px;" placeholder="Codice...">
    <button onclick="save()" style="padding:15px; background:green; color:white; width:80%;">2. SALVA</button>
    <p id="msg"></p>

    <script type="module">
        import { createClient } from 'https://jsdelivr.net/+esm'
        const supabase = createClient('https://supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZHBuaG1kamJid3dxd2pzZG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDE5ODQsImV4cCI6MjA5MjQxNzk4NH0.yXcJBcZtiaDbPl2IyDUBK-Ndoyu0unmEzfY8xZrogzM');
        
        window.start = () => {
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (txt) => {
                document.getElementById('ean').value = txt;
            }).catch(e => alert("Errore: " + e));
        }

        window.save = async () => {
            const ean = document.getElementById('ean').value;
            const res = await fetch(`https://openfoodfacts.org{ean}.json`);
            const data = await res.json();
            if (data.status === 1) {
                await supabase.from('prodotti').insert([{ ean: ean, nome: data.product.product_name }]);
                document.getElementById('msg').innerText = "OK: " + data.product.product_name;
            }
        }
    </script>
</body>
</html>
