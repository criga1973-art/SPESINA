<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master PIcking - Dashboard Operativa</title>
    
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9333ea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9333ea; /* Viola Lilla Screenshots */
            --primary-dark: #7e22ce;
            --success: #10b981; /* Verde Mappe */
            --dark: #0f172a; /* Sfondo Ardesia */
            --dark-lighter: #1e293b;
            --dark-card: #111827;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --red: #ef4444;
            --blue: #3b82f6;
            --accent: #f59e0b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Rimosso overflow: hidden per permettere lo scroll naturale se necessario */
        }

        header {
            background: var(--dark-lighter);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-weight: 800; font-size: 18px; color: white; }
        .logo span { color: var(--primary); }

        .date-strip {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            background: var(--dark);
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .date-strip::-webkit-scrollbar { display: none; }

        .date-btn {
            min-width: 50px;
            height: 50px;
            border-radius: 12px;
            background: var(--dark-lighter);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
        }

        .date-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .date-btn span { font-size: 10px; opacity: 0.6; font-weight: 400; }

        /* Tabs Style Screenshots */
        .tab-bar {
            display: flex;
            background: var(--dark-lighter);
            padding: 5px;
            gap: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 0;
            border: none;
            border-radius: 10px;
            background: #2d3748;
            color: white;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--primary);
        }

        .main-container {
            flex: 1;
            display: flex;
            position: relative;
            height: calc(100vh - 120px); /* Altezza dinamica togliendo header e tabs */
            overflow: hidden;
        }

        .view-pane {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 80px; /* Spazio extra in fondo per non coprire l'ultimo elemento */
        }

        .view-pane.active {
            display: flex;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Master Pick List Style */
        .picking-section-title {
            font-size: 16px;
            font-weight: 800;
            padding: 10px 5px;
            color: white;
        }

        .picking-item {
            background: var(--dark-lighter);
            padding: 15px;
            margin-bottom: 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .picking-qty {
            font-size: 18px;
            font-weight: 900;
            color: white;
            min-width: 30px;
        }

        .picking-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .picking-name {
            font-size: 15px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .picking-ean {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Order Cards Style */
        .order-card {
            background: var(--dark-card);
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .card-date {
            font-size: 18px;
            font-weight: 800;
            color: #a855f7; /* Viola più chiaro per risaltare */
        }

        .card-status {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            background: var(--blue);
            color: white;
        }
        .card-status.nuovo { background: var(--blue); }
        .card-status.in_preparazione { background: rgba(255,255,255,0.1); border: 1px solid white; }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .info-row { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .info-row b { color: white; }
        .info-address { color: var(--success); font-weight: 600; }

        .btn-avvia {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            width: 100%;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* Detail Overlay Screenshots */
        #order-detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            z-index: 10000;
            display: none;
            flex-direction: column;
        }

        .detail-nav {
            padding: 15px;
            display: flex;
            align-items: center;
            background: var(--dark-lighter);
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            padding: 0;
            cursor: pointer;
        }

        .detail-title-container { flex: 1; }
        .detail-title { font-size: 14px; font-weight: 800; color: white; margin: 0; }
        .detail-subtitle { font-size: 10px; color: var(--text-muted); }

        .consegna-section {
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .consegna-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .consegna-name { font-size: 18px; font-weight: 800; color: white; text-transform: uppercase; }
        .consegna-addr { font-size: 12px; color: var(--success); margin-top: 4px; }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .btn-action {
            height: 50px;
            border-radius: 10px;
            border: none;
            color: white;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn-maps { background: var(--success); }
        .btn-chiama { background: var(--primary); }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            background: rgba(255,255,255,0.01);
        }

        .detail-item img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            background: white;
            border-radius: 6px;
        }

        .item-info { flex: 1; }
        .item-name { font-size: 13px; font-weight: 700; color: white; }
        .item-sub { font-size: 10px; color: var(--text-muted); }

        .item-actions { display: flex; gap: 8px; }
        .circle-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            color: white;
            cursor: pointer;
        }
        .circle-btn.trash { border-color: var(--red); color: var(--red); }
        .circle-btn.check { border-color: var(--success); color: var(--success); }
        .circle-btn.check.active { background: var(--success); color: white; }

        .footer-actions {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: var(--dark-lighter);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">SPESINA <span>Master PIcking</span></div>
        <button id="btn-refresh" onclick="loadData()" style="background:none; border:none; color:var(--primary); font-size:14px; font-weight:800; cursor:pointer; transition: opacity 0.2s;">AGGIORNA</button>
    </header>

    <div class="date-strip" id="date-strip"></div>

    <div class="tab-bar">
        <button class="tab-btn active" id="tab-picking" onclick="switchTab('picking')">PRELIEVO</button>
        <button class="tab-btn" id="tab-orders" onclick="switchTab('orders')">ORDINI</button>
    </div>

    <div class="main-container">
        <div id="view-picking" class="view-pane active">
            <div class="scroll-area">
                <div class="picking-section-title">Master Pick List (Dry)</div>
                <div id="picking-list"></div>
            </div>
        </div>
        <div id="view-orders" class="view-pane">
            <div class="scroll-area" id="orders-list"></div>
        </div>
    </div>

    <!-- Dettaglio Ordine -->
    <div id="order-detail-overlay">
        <div class="detail-nav">
            <button class="back-btn" onclick="closeDetail()">←</button>
            <div class="detail-title-container">
                <div class="detail-title" id="det-order-id">DETTAGLIO ORDINE #---</div>
                <div class="detail-subtitle" id="det-progress">0 di 0 prodotti spuntati</div>
            </div>
        </div>

        <div class="consegna-section">
            <div class="consegna-label">📍 Dati Consegna</div>
            <div class="consegna-name" id="det-customer">NOME CLIENTE</div>
            <div class="consegna-addr" id="det-address">Indirizzo non specificato</div>
        </div>

        <div class="action-grid">
            <a id="del-maps-btn" href="#" target="_blank" class="btn-action btn-maps">🗺️ APRI MAPS</a>
            <a id="del-call-btn" href="#" class="btn-action btn-chiama">📞 CHIAMA</a>
        </div>

        <div class="scroll-area" id="det-items-list"></div>

        <div class="footer-actions">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span style="font-size:12px; color:var(--text-muted); font-weight:700;">TOTALE</span>
                <span id="del-total" style="font-size:24px; font-weight:900; color:white;">0.00 €</span>
            </div>
            <button id="btn-start-delivery" class="btn-avvia" disabled onclick="updateOrderStatus('in_consegna')">VAI IN CONSEGNA</button>
            <button id="btn-complete-order" class="btn-avvia" style="display:none; background:var(--success);" onclick="updateOrderStatus('completato')">INCASSA E CHIUDI</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://uldpnhmdjbbwwqwjsdoh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZHBuaG1kamJid3dxd2pzZG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDE5ODQsImV4cCI6MjA5MjQxNzk4NH0.yXcJBcZtiaDbPl2IyDUBK-Ndoyu0unmEzfY8xZrogzM";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allOrders = [];
        let allProducts = [];
        let selectedOrder = null;
        let checkedItems = new Set();
        let selectedDate = "ALL";

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function switchTab(tab) {
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'picking') {
                document.getElementById('view-picking').classList.add('active');
                document.getElementById('tab-picking').classList.add('active');
            } else {
                document.getElementById('view-orders').classList.add('active');
                document.getElementById('tab-orders').classList.add('active');
            }
        }

        function initDateSelector() {
            const strip = document.getElementById('date-strip');
            const days = ["Dom", "Lun", "Mar", "Mer", "Gio", "Ven", "Sab"];
            strip.innerHTML = '';
            const btnAll = document.createElement('div');
            btnAll.className = "date-btn active";
            btnAll.innerHTML = `ALL<span>Sett.</span>`;
            btnAll.onclick = () => selectDate("ALL", btnAll);
            strip.appendChild(btnAll);

            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dayNum = d.getDate();
                const dayName = days[d.getDay()];
                const fullVal = `${["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"][d.getDay()]} ${dayNum} ${["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"][d.getMonth()]}`;
                const btn = document.createElement('div');
                btn.className = "date-btn";
                btn.innerHTML = `${dayNum}<span>${dayName}</span>`;
                btn.onclick = () => selectDate(fullVal, btn);
                strip.appendChild(btn);
            }
        }

        function selectDate(val, btn) {
            selectedDate = val;
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadData();
        }

        async function loadData() {
            const btn = document.getElementById('btn-refresh');
            if (btn) {
                btn.innerText = "CARICAMENTO...";
                btn.style.opacity = "0.5";
            }
            
            try {
                const [ordersRes, prodsRes] = await Promise.all([
                    sb.from('orders').select('*').neq('order_data->>status', 'completato').order('created_at', { ascending: false }),
                    sb.from('products').select('*')
                ]);

                if (ordersRes.error) throw ordersRes.error;
                allProducts = prodsRes.data || [];
                
                const data = ordersRes.data || [];
                if (selectedDate === "ALL") {
                    allOrders = data;
                } else {
                    allOrders = data.filter(o => o.order_data.delivery && o.order_data.delivery.startsWith(selectedDate));
                }

                allOrders.sort((a, b) => {
                    const getHour = (s) => parseInt(s.split(' ').slice(-1)[0].split(':')[0]) || 0;
                    return getHour(a.order_data.delivery) - getHour(b.order_data.delivery);
                });
                
                renderPicking();
                renderOrders();
            } catch (err) {
                console.error("Errore caricamento dati:", err);
                alert("Errore durante l'aggiornamento. Riprova.");
            } finally {
                if (btn) {
                    btn.innerText = "AGGIORNA";
                    btn.style.opacity = "1";
                }
            }
        }

        function getProductData(item) {
            const catalogProd = allProducts.find(p => 
                (p.ean && item.ean && String(p.ean).trim() === String(item.ean).trim()) || 
                (p.name && item.n && p.name.toLowerCase() === item.n.toLowerCase())
            );
            return {
                img: catalogProd ? catalogProd.image_url : (item.img || item.image_url || item.image || ''),
                name: catalogProd ? catalogProd.name : item.n,
                brand: catalogProd ? catalogProd.brand : (item.b || '')
            };
        }

        function renderPicking() {
            const pickingList = document.getElementById('picking-list');
            const dryProducts = {};

            allOrders.forEach(order => {
                const items = order.order_data.items || [];
                items.forEach(item => {
                    const cat = (item.c || "").toLowerCase();
                    if (cat !== 'freschi' && cat !== 'orto' && cat !== 'surgelati') {
                        const key = item.ean || item.n;
                        const pData = getProductData(item);
                        if (!dryProducts[key]) {
                            dryProducts[key] = { n: pData.name, b: pData.brand, q: 0, img: pData.img, ean: item.ean };
                        }
                        dryProducts[key].q += (parseInt(item.q) || 1);
                    }
                });
            });

            const itemsArray = Object.values(dryProducts).sort((a, b) => a.n.localeCompare(b.n));
            pickingList.innerHTML = itemsArray.length === 0 ? '<div style="font-size:12px; color:var(--text-muted); text-align:center; padding:20px;">Nessun prodotto dry</div>' : 
                itemsArray.map(item => `
                <div class="picking-item" style="display:flex; align-items:center; gap:15px; background:var(--dark-lighter); padding:12px; margin-bottom:5px; border-radius:8px;">
                    <img src="${item.img || 'https://via.placeholder.com/55?text=📦'}" 
                         style="width:55px; height:55px; object-fit:contain; background:white; border-radius:8px; flex-shrink:0;"
                         onerror="this.src='https://via.placeholder.com/55?text=📦'">
                    <div class="picking-details" style="flex:1;">
                        <div class="picking-name" style="font-size:14px; font-weight:700;">${item.b ? item.b + ' ' : ''}${item.n}</div>
                        <div class="picking-ean" style="font-size:11px; color:var(--text-muted);">EAN: ${item.ean || '---'}</div>
                    </div>
                    <div class="picking-qty" style="font-size:24px; font-weight:900; color:white; min-width:45px; text-align:right;">${item.q}x</div>
                </div>
            `).join('');
        }

        function renderOrders() {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = allOrders.length === 0 ? '<div style="font-size:12px; color:var(--text-muted); text-align:center; padding:20px;">Nessun ordine</div>' :
                allOrders.map(o => {
                const d = o.order_data;
                const status = d.status || 'nuovo';
                const shortId = o.id.toString().slice(0, 8).toUpperCase();
                const totalPezzi = d.items ? d.items.reduce((acc, curr) => acc + (parseInt(curr.q) || 0), 0) : 0;
                return `
                    <div class="order-card">
                        <div class="card-header">
                            <div class="card-date">${d.delivery.split(',')[0]} ${d.delivery.split(' ').slice(-1)[0]}</div>
                            <div class="card-status ${status.replace(' ', '_')}">${status.toUpperCase()}</div>
                        </div>
                        <div class="card-info">
                            <div class="info-row">ID: <b>${shortId}</b></div>
                            <div class="info-row">Cliente: <b>${d.name}</b></div>
                            <div class="info-row info-address">📍 ${d.address}</div>
                            <div class="info-row">📦 ${d.items ? d.items.length : 0} articoli (${totalPezzi} pezzi) &nbsp;&nbsp; 💰 ${parseFloat(d.total || 0).toFixed(2)}€</div>
                        </div>
                        <button class="btn-avvia" onclick="openDetail('${o.id}')">AVVIA ORDINE</button>
                    </div>
                `;
            }).join('');
        }

        function openDetail(orderId) {
            selectedOrder = allOrders.find(o => o.id == orderId);
            if (!selectedOrder) return;
            const d = selectedOrder.order_data;
            const shortId = selectedOrder.id.toString().slice(0, 8).toUpperCase();
            document.getElementById('det-order-id').innerText = `DETTAGLIO ORDINE #${shortId}`;
            document.getElementById('det-customer').innerText = d.name;
            document.getElementById('det-address').innerText = d.address;
            document.getElementById('del-total').innerText = `${parseFloat(d.total || 0).toFixed(2)} €`;
            document.getElementById('del-maps-btn').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address_full || d.address)}`;
            document.getElementById('del-call-btn').href = `tel:${d.phone}`;
            checkedItems.clear();
            renderItemsDetail(d.items || []);
            updateProgress();
            const status = d.status || 'nuovo';
            const btnStart = document.getElementById('btn-start-delivery');
            const btnComplete = document.getElementById('btn-complete-order');
            if (status === 'in_consegna') { btnStart.style.display = 'none'; btnComplete.style.display = 'block'; }
            else { btnStart.style.display = 'block'; btnStart.disabled = true; btnComplete.style.display = 'none'; }
            document.getElementById('order-detail-overlay').style.display = 'flex';
        }

        function renderItemsDetail(items) {
            const list = document.getElementById('det-items-list');
            list.innerHTML = items.map((item, idx) => {
                const isChecked = checkedItems.has(idx);
                const pData = getProductData(item);
                return `
                    <div class="detail-item" id="item-row-${idx}">
                        <img src="${pData.img || 'https://via.placeholder.com/45?text=📦'}" onerror="this.src='https://via.placeholder.com/45?text=📦'">
                        <div class="item-info">
                            <div class="item-name">${pData.name}</div>
                            <div class="item-sub">${item.q}x | EAN: ${item.ean || '---'} | ${parseFloat(item.p || 0).toFixed(2)}€</div>
                        </div>
                        <div class="item-actions">
                            <button class="circle-btn trash" onclick="alert('Funzione cestino in arrivo')">🗑️</button>
                            <button class="circle-btn check ${isChecked ? 'active' : ''}" onclick="toggleItem(${idx})">✓</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleItem(idx) {
            const btn = document.querySelector(`#item-row-${idx} .circle-btn.check`);
            if (checkedItems.has(idx)) { checkedItems.delete(idx); btn.classList.remove('active'); }
            else { checkedItems.add(idx); btn.classList.add('active'); }
            updateProgress();
        }

        function updateProgress() {
            const total = selectedOrder.order_data.items.length;
            const done = checkedItems.size;
            document.getElementById('det-progress').innerText = `${done} di ${total} prodotti spuntati`;
            const btnStart = document.getElementById('btn-start-delivery');
            if (btnStart) {
                const allDone = done === total;
                btnStart.disabled = !allDone;
                btnStart.style.opacity = allDone ? "1" : "0.3";
            }
        }

        async function updateOrderStatus(newStatus) {
            if (!selectedOrder) return;
            const updatedData = { ...selectedOrder.order_data, status: newStatus };
            const { error } = await sb.from('orders').update({ order_data: updatedData }).eq('id', selectedOrder.id);
            if (error) return alert("Errore: " + error.message);
            if (newStatus === 'completato') { closeDetail(); }
            else { openDetail(selectedOrder.id); }
            loadData();
        }

        function closeDetail() { document.getElementById('order-detail-overlay').style.display = 'none'; selectedOrder = null; }
        initDateSelector();
        loadData();
    </script>
</body>
</html>
