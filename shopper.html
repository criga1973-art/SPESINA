<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPESINA Shopper - Dashboard Operativa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --dark: #0f172a;
            --dark-lighter: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --red: #ef4444;
            --blue: #3b82f6;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background: var(--dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation; /* Migliora reattività touch */
        }

        header {
            background: var(--dark-lighter);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 800; font-size: 18px; color: white; }
        .logo span { color: var(--primary); }

        .date-strip {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            background: var(--dark);
            scrollbar-width: none;
        }
        .date-strip::-webkit-scrollbar { display: none; }

        .date-btn {
            min-width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--dark-lighter);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
        }

        .date-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .date-btn span { font-size: 10px; opacity: 0.7; font-weight: 400; }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .view-pane {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .view-pane.active {
            display: flex;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Picking List Items */
        .picking-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--dark-lighter);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .picking-item img {
            width: 35px;
            height: 35px;
            object-fit: contain;
            background: white;
            border-radius: 6px;
        }

        .picking-qty {
            background: var(--accent);
            color: var(--dark);
            min-width: 24px;
            height: 24px;
            padding: 0 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 12px;
        }

        /* Example Inspired Tab Bar */
        .tab-bar {
            display: flex;
            background: var(--dark-lighter);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 18px 0;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
        }

        .tab-btn.active {
            color: white;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background: var(--primary);
            border-radius: 4px 4px 0 0;
        }

        /* Example Inspired Order Card */
        .order-card {
            background: var(--dark-lighter);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-slot {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 5px;
            color: white;
        }

        .card-id {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .info-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
        }

        .info-value {
            color: white;
            font-weight: 400;
        }

        .btn-avvia {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            width: 100%;
            font-weight: 800;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn:disabled { opacity: 0.2; }

    </style>
</head>
<body>

    <header>
        <div class="logo">SPESINA <span>SHOPPER</span></div>
        <button onclick="loadData()" style="background:none; border:none; color:var(--primary); font-size:20px;">🔄</button>
    </header>

    <div class="date-strip" id="date-strip">
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" id="tab-picking" onclick="switchTab('picking')">🛒 PICKING</button>
        <button class="tab-btn" id="tab-orders" onclick="switchTab('orders')">📦 ORDINI</button>
    </div>

    <div class="main-container">
        <div id="view-picking" class="view-pane active">
            <div class="scroll-area" id="picking-list"></div>
        </div>
        <div id="view-orders" class="view-pane">
            <div class="scroll-area" id="orders-list"></div>
        </div>
    </div>

    <div id="order-detail-overlay">
        <div class="det-header">
            <h3 id="det-order-id" style="margin:0; font-size:16px; color:var(--primary);">#ORDINE</h3>
            <button onclick="closeDetail()" style="background:none; border:none; color:white; font-size:28px;">✕</button>
        </div>
        
        <div class="det-content">
            <div id="boxing-header" style="margin-bottom:25px;">
                <h2 id="det-customer" style="margin:0 0 5px 0; font-size:26px; font-weight:800;">Nome Cliente</h2>
                <div id="det-address" style="color:var(--text-muted); font-size:16px;">Via Indirizzo, Mestre</div>
            </div>
            
            <div id="delivery-info" style="display:none; background:rgba(59, 130, 246, 0.2); padding:25px; border-radius:24px; border:1px solid var(--blue); margin-bottom:30px;">
                <div style="font-size:11px; text-transform:uppercase; color:var(--blue); font-weight:900; margin-bottom:15px;">🚚 CONSEGNA IN CORSO</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:25px;">
                    <div style="background:rgba(0,0,0,0.4); padding:15px; border-radius:18px;">
                        <div style="font-size:10px; opacity:0.6; margin-bottom:5px;">DA INCASSARE</div>
                        <div id="del-total" style="font-size:22px; font-weight:900; color:var(--accent);">€ 0.00</div>
                    </div>
                    <div style="background:rgba(0,0,0,0.4); padding:15px; border-radius:18px;">
                        <div style="font-size:10px; opacity:0.6; margin-bottom:5px;">ORARIO</div>
                        <div id="del-time" style="font-size:16px; font-weight:800;">--:--</div>
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <a id="del-maps-btn" href="#" target="_blank" class="btn btn-maps">📍 AVVIA NAVIGATORE</a>
                    <a id="del-call-btn" href="#" class="btn btn-call">📞 CHIAMA CLIENTE</a>
                </div>
            </div>

            <h4 id="items-header" style="border-bottom:2px solid rgba(255,255,255,0.1); padding-bottom:10px; margin-bottom:15px; color:var(--primary); font-size:12px; text-transform:uppercase; font-weight:900;">Composizione Scatola</h4>
            <div id="det-items-list" style="margin-bottom:30px;"></div>
            <div id="det-actions">
                <button id="btn-start-delivery" class="btn btn-delivery" disabled onclick="updateOrderStatus('in_consegna')">📦 VAI IN CONSEGNA</button>
                <button id="btn-complete-order" class="btn btn-close" style="display:none;" onclick="updateOrderStatus('completato')">💰 INCASSA E CHIUDI</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://uldpnhmdjbbwwqwjsdoh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZHBuaG1kamJid3dxd2pzZG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDE5ODQsImV4cCI6MjA5MjQxNzk4NH0.yXcJBcZtiaDbPl2IyDUBK-Ndoyu0unmEzfY8xZrogzM";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allOrders = [];
        let selectedOrder = null;
        let checkedItems = new Set();

        let selectedDate = "ALL";

        function switchTab(tab) {
            document.querySelectorAll('.view-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            if (tab === 'picking') {
                document.getElementById('view-picking').classList.add('active');
                document.getElementById('tab-picking').classList.add('active');
            } else {
                document.getElementById('view-orders').classList.add('active');
                document.getElementById('tab-orders').classList.add('active');
            }
        }

        function initDateSelector() {
            const strip = document.getElementById('date-strip');
            const days = ["Dom", "Lun", "Mar", "Mer", "Gio", "Ven", "Sab"];
            
            // Pulsante ALL
            const btnAll = document.createElement('div');
            btnAll.className = "date-btn active";
            btnAll.innerHTML = `ALL<span>Sett.</span>`;
            btnAll.onclick = () => selectDate("ALL", btnAll);
            strip.appendChild(btnAll);

            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dayNum = d.getDate();
                const dayName = days[d.getDay()];
                const fullVal = `${["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"][d.getDay()]} ${dayNum} ${["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"][d.getMonth()]}`;
                
                const btn = document.createElement('div');
                btn.className = "date-btn";
                btn.innerHTML = `${dayNum}<span>${dayName}</span>`;
                btn.onclick = () => selectDate(fullVal, btn);
                strip.appendChild(btn);
            }
        }

        function selectDate(val, btn) {
            selectedDate = val;
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadData();
        }

        async function loadData() {
            const { data, error } = await sb.from('orders')
                .select('*')
                .neq('order_data->>status', 'completato')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            if (selectedDate === "ALL") {
                allOrders = data;
            } else {
                allOrders = data.filter(o => o.order_data.delivery && o.order_data.delivery.startsWith(selectedDate));
            }

            allOrders.sort((a, b) => {
                const getHour = (s) => parseInt(s.split(' ').slice(-1)[0].split(':')[0]) || 0;
                return getHour(a.order_data.delivery) - getHour(b.order_data.delivery);
            });
            
            renderPicking();
            renderOrders();
        }

        function renderPicking() {
            const pickingList = document.getElementById('picking-list');
            const dryProducts = {};

            allOrders.forEach(order => {
                const items = order.order_data.items || [];
                items.forEach(item => {
                    const cat = (item.c || "").toLowerCase();
                    if (cat !== 'freschi' && cat !== 'orto' && cat !== 'surgelati') {
                        const key = item.ean || item.n;
                        if (!dryProducts[key]) {
                            dryProducts[key] = { n: item.n, b: item.b || '', q: 0, img: item.img, ean: item.ean };
                        }
                        dryProducts[key].q += (item.q || 1);
                    }
                });
            });

            const itemsArray = Object.values(dryProducts);
            pickingList.innerHTML = itemsArray.length === 0 ? '<div style="font-size:10px; color:var(--text-muted); text-align:center; padding:20px;">Vuoto</div>' : 
                itemsArray.map(item => `
                <div class="picking-item">
                    <div class="picking-qty">${item.q}</div>
                    <img src="${item.img || 'img/placeholder.png'}" onerror="this.src='https://uldpnhmdjbbwwqwjsdoh.supabase.co/storage/v1/object/public/products/sub_icon.png'">
                    <div style="flex:1;">
                        <div style="font-weight:700; font-size:11px; line-height:1.2;">${item.b ? item.b + ' ' : ''}${item.n}</div>
                        <div style="font-size:9px; color:var(--text-muted);">EAN: ${item.ean || 'N/D'}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderOrders() {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = allOrders.length === 0 ? '<div style="font-size:12px; color:var(--text-muted); text-align:center; padding:20px;">Nessun ordine</div>' :
                allOrders.map(o => {
                const d = o.order_data;
                const status = d.status || 'nuovo';
                const shortId = o.id.toString().slice(0, 8).toUpperCase();
                const itemsCount = d.items ? d.items.length : 0;
                const totalPezzi = d.items ? d.items.reduce((acc, curr) => acc + (parseInt(curr.q) || 0), 0) : 0;
                
                return `
                    <div class="order-card">
                        <div class="card-slot">Consegna ${d.delivery.includes('oggi') ? 'oggi' : ''}, ${d.delivery.split(' ').slice(-1)[0]}</div>
                        <div class="card-id">ID ${shortId} 📋</div>
                        
                        <div style="font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:10px; text-transform:uppercase;">Sintesi</div>
                        
                        <div class="info-row">
                            <div class="info-label">Cliente</div>
                            <div class="info-value">${d.name}</div>
                        </div>
                        <div class="info-row" style="color:var(--primary); font-weight:bold;">
                            <div class="info-label">Indirizzo</div>
                            <div class="info-value">${d.address}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Quantità</div>
                            <div class="info-value">${itemsCount} (${totalPezzi} pezzi)</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Prezzo</div>
                            <div class="info-value">${parseFloat(d.total || 0).toFixed(2)} €</div>
                        </div>

                        <button class="btn-avvia" onclick="openDetail('${o.id}')">Avvia ordine</button>
                    </div>
                `;
            }).join('');
        }

        function openDetail(orderId) {
            selectedOrder = allOrders.find(o => o.id == orderId);
            if (!selectedOrder) return;

            const d = selectedOrder.order_data;
            const shortId = selectedOrder.id.toString().slice(0, 8).toUpperCase();
            
            const elId = document.getElementById('det-order-id');
            const elCust = document.getElementById('det-customer');
            const elAddr = document.getElementById('det-address');
            
            if(elId) elId.innerText = `#${shortId}`;
            if(elCust) elCust.innerText = d.name;
            if(elAddr) elAddr.innerText = d.address;
            
            // Popola i dati consegna (nuova scheda blu)
            const elTotal = document.getElementById('del-total');
            const elTime = document.getElementById('del-time');
            const elMaps = document.getElementById('del-maps-btn');
            const elCall = document.getElementById('del-call-btn');

            if(elTotal) elTotal.innerText = `€ ${parseFloat(d.total || 0).toFixed(2)}`;
            if(elTime && d.delivery) elTime.innerText = d.delivery.split(' ').slice(-1)[0];
            if(elMaps) elMaps.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address_full || d.address)}`;
            if(elCall) elCall.href = `tel:${d.phone}`;
            
            checkedItems.clear();
            renderItemsDetail(d.items || []);
            
            const status = d.status || 'nuovo';
            const btnStart = document.getElementById('btn-start-delivery');
            const btnComplete = document.getElementById('btn-complete-order');
            const deliveryBox = document.getElementById('delivery-info');
            const itemsBox = document.getElementById('det-items-list');
            const itemsHeader = document.getElementById('items-header');
            const boxingHeader = document.getElementById('boxing-header');

            if (status === 'in_consegna') {
                if(deliveryBox) deliveryBox.style.display = 'block';
                if(boxingHeader) boxingHeader.style.display = 'none';
                if(itemsBox) itemsBox.style.display = 'none';
                if(itemsHeader) itemsHeader.style.display = 'none';
                if(btnStart) btnStart.style.display = 'none';
                if(btnComplete) btnComplete.style.display = 'block';
            } else {
                if(deliveryBox) deliveryBox.style.display = 'none';
                if(boxingHeader) boxingHeader.style.display = 'block';
                if(itemsBox) itemsBox.style.display = 'block';
                if(itemsHeader) itemsHeader.style.display = 'block';
                if(btnStart) {
                    btnStart.style.display = 'block';
                    btnStart.disabled = true;
                }
                if(btnComplete) btnComplete.style.display = 'none';
            }

            const overlay = document.getElementById('order-detail-overlay');
            if(overlay) {
                overlay.style.display = 'flex';
                overlay.style.zIndex = "9999"; 
            }
        }

        function renderItemsDetail(items) {
            const list = document.getElementById('det-items-list');
            list.innerHTML = items.map((item, idx) => `
                <div class="item-row" id="item-row-${idx}" onclick="toggleItem(${idx})">
                    <div class="checkbox-custom"></div>
                    <img src="${item.img || 'https://uldpnhmdjbbwwqwjsdoh.supabase.co/storage/v1/object/public/products/sub_icon.png'}" onerror="this.src='https://uldpnhmdjbbwwqwjsdoh.supabase.co/storage/v1/object/public/products/sub_icon.png'">
                    <div style="flex:1;">
                        <div style="font-weight:800; font-size:14px;">${item.q}x ${item.n}</div>
                        <div style="font-size:10px; color:var(--text-muted);">${item.b || ''} | EAN: ${item.ean || 'N/D'}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleItem(idx) {
            const row = document.getElementById(`item-row-${idx}`);
            if (checkedItems.has(idx)) {
                checkedItems.delete(idx);
                row.classList.remove('checked');
            } else {
                checkedItems.add(idx);
                row.classList.add('checked');
            }

            const totalItems = selectedOrder.order_data.items.length;
            const btn = document.getElementById('btn-start-delivery');
            btn.disabled = (checkedItems.size < totalItems);
        }

        async function updateOrderStatus(newStatus) {
            if (!selectedOrder) return;

            const updatedData = { ...selectedOrder.order_data, status: newStatus };
            
            const { error } = await sb.from('orders')
                .update({ order_data: updatedData })
                .eq('id', selectedOrder.id);

            if (error) {
                alert("Errore aggiornamento ordine: " + error.message);
                return;
            }

            if (newStatus === 'completato') {
                sendThanksEmail(updatedData);
                alert("✅ Ordine Chiuso! Email di ringraziamento inviata.");
                closeDetail();
            } else {
                alert("🚀 Consegna avviata!");
                openDetail(selectedOrder.id); // Refresh view
            }
            
            loadData(); // Refresh lists
        }

        async function sendThanksEmail(data) {
            try {
                await fetch("https://uldpnhmdjbbwwqwjsdoh.supabase.co/functions/v1/send-welcome", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
                    body: JSON.stringify({
                        type: 'thanks',
                        name: data.name,
                        email: data.email,
                        total: data.total
                    })
                });
            } catch (err) { console.error("Errore invio email ringraziamento:", err); }
        }

        function closeDetail() {
            document.getElementById('order-detail-overlay').style.display = 'none';
            selectedOrder = null;
        }

        // Init
        initDateSelector();
        loadData();
    </script>
</body>
</html>
