<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spesina Shopper Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #9333ea;
            --primary-dark: #7e22ce;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
        }

        header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #334155;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .container { padding: 15px; }

        .order-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .order-time { font-weight: 800; font-size: 18px; color: var(--primary); }
        .order-id { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .client-info { margin-bottom: 15px; font-size: 14px; }
        .client-address { 
            color: var(--success); 
            text-decoration: none; 
            display: block; 
            margin-top: 5px;
            font-weight: 600;
        }

        .order-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-action:active { transform: scale(0.98); }

        /* Checklist Styles */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            border-bottom: 1px solid #334155;
            transition: 0.3s;
        }

        .item-row.checked { opacity: 0.4; filter: grayscale(1); }

        .item-img {
            width: 50px; height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 14px; }
        .item-ean { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .item-controls { display: flex; gap: 8px; }

        .btn-check {
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 2px solid var(--success);
            background: transparent;
            color: var(--success);
            font-weight: bold;
            cursor: pointer;
        }

        .btn-check.active { background: var(--success); color: white; }

        .btn-delete {
            width: 40px; height: 40px;
            border-radius: 10px;
            border: 2px solid var(--danger);
            background: transparent;
            color: var(--danger);
            font-weight: bold;
            cursor: pointer;
        }

        /* Master Pick List Styles */
        .master-item {
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .login-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }

        .pin-input {
            width: 100%;
            max-width: 200px;
            padding: 15px;
            background: #334155;
            border: 2px solid #475569;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-nuovo { background: #3b82f6; color: white; }
        .status-preparazione { background: #f59e0b; color: white; }
        .status-consegna { background: #10b981; color: white; }

    </style>
</head>
<body>

    <div id="login-screen" class="login-overlay">
        <h2 style="font-weight: 800; color: var(--primary);">Shopper Login</h2>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">Inserisci il PIN per accedere</p>
        <input type="password" id="shopper-pin" class="pin-input" placeholder="••••" maxlength="4" inputmode="numeric">
        <button class="btn-action" onclick="checkPin()" style="max-width: 200px;">ACCEDI</button>
    </div>

    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="margin:0; font-size: 20px; font-weight: 800;">Spesina <span style="color:var(--primary);">Shopper</span></h1>
            <div style="font-size: 12px; color: var(--text-muted);" id="last-update">Aggiornato ora</div>
        </div>
        <div class="tabs">
            <div class="tab active" id="tab-master" onclick="showTab('master')">PRELIEVO</div>
            <div class="tab" id="tab-orders" onclick="showTab('orders')">ORDINI</div>
        </div>
    </header>

    <div class="container" id="content-master">
        <h3 style="margin-top: 0;">Master Pick List (Dry)</h3>
        <div id="master-list-container">
            <!-- Items loaded here -->
        </div>
    </div>

    <div class="container" id="content-orders" style="display: none;">
        <!-- Orders loaded here -->
    </div>

    <!-- Modal Checklist Ordine -->
    <div id="modalChecklist" class="modal">
        <div class="modal-header">
            <button onclick="closeChecklist()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">←</button>
            <div style="flex: 1;">
                <h3 id="checklist-title" style="margin:0; font-size:16px;">Dettaglio Ordine</h3>
                <div id="checklist-subtitle" style="font-size:11px; color:var(--text-muted);">0 di 0 prodotti spuntati</div>
            </div>
        </div>
        <div id="checklist-items" style="flex: 1; overflow-y: auto;">
            <!-- Items loaded here -->
        </div>
        <div style="padding: 20px; background: var(--card); border-top: 1px solid #334155;">
            <div id="checklist-total" style="font-weight: 800; font-size: 20px; margin-bottom: 15px; text-align: right;">Totale: 0.00€</div>
            <button id="btn-finish-preparazione" class="btn-action" style="background: var(--success); display: none;" onclick="setStatus('da consegnare')">PREPARAZIONE FINITA</button>
            <button id="btn-finish-delivery" class="btn-action" style="background: var(--success); display: none;" onclick="finishOrder()">CONSEGNATO E INCASSATO</button>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE SUPABASE (Sincronizzata con .env)
        const SB_URL = "https://uldpnhmdjbbwwqwjsdoh.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZHBuaG1kamJid3dxd2pzZG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDE5ODQsImV4cCI6MjA5MjQxNzk4NH0.yXcJBcZtiaDbPl2IyDUBK-Ndoyu0unmEzfY8xZrogzM";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const SHOPPER_PIN = "1973"; // PIN provvisorio (Tuo anno di nascita?)
        
        let allOrders = [];
        let currentOrder = null;
        let checkedItems = new Set();

        async function init() {
            if (sessionStorage.getItem('shopper_auth') === 'true') {
                document.getElementById('login-screen').style.display = 'none';
                loadData();
            }
        }

        function checkPin() {
            const pin = document.getElementById('shopper-pin').value;
            if (pin === SHOPPER_PIN) {
                sessionStorage.setItem('shopper_auth', 'true');
                document.getElementById('login-screen').style.display = 'none';
                loadData();
            } else {
                alert("PIN Errato!");
            }
        }

        async function loadData() {
            try {
                const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                
                // Filtriamo solo gli ordini che non sono chiusi
                allOrders = data.filter(o => o.order_data.status !== 'concluso');
                
                renderOrders();
                renderMasterList();
                document.getElementById('last-update').innerText = "Aggiornato: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Errore caricamento dati:", err);
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            document.getElementById('content-master').style.display = tab === 'master' ? 'block' : 'none';
            document.getElementById('content-orders').style.display = tab === 'orders' ? 'block' : 'none';
        }

        function renderOrders() {
            const container = document.getElementById('content-orders');
            let html = "";
            
            allOrders.forEach(o => {
                const d = o.order_data;
                const statusClass = "status-" + (d.status || 'nuovo').replace(" ", "");
                const itemCount = d.items.reduce((acc, i) => acc + i.q, 0);
                
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-time">${d.delivery}</div>
                                <div class="order-id">ID: ${o.id.split('-')[0].toUpperCase()}</div>
                            </div>
                            <div class="status-badge ${statusClass}">${d.status || 'Nuovo'}</div>
                        </div>
                        <div class="client-info">
                            <b>Cliente:</b> ${d.name || 'Anonimo'}
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address)}" target="_blank" class="client-address">📍 ${d.address}</a>
                        </div>
                        <div class="order-stats">
                            <div>📦 ${d.items.length} articoli (${itemCount} pezzi)</div>
                            <div>💰 ${d.total_amount ? d.total_amount.toFixed(2) : '0.00'}€</div>
                        </div>
                        <button class="btn-action" onclick="openOrder('${o.id}')">${d.status === 'da consegnare' ? 'GESTISCI CONSEGNA' : 'AVVIA ORDINE'}</button>
                    </div>
                `;
            });
            
            container.innerHTML = html || "<div style='text-align:center; padding:50px; color:var(--text-muted);'>Nessun ordine da fare 😴</div>";
        }

        function renderMasterList() {
            const container = document.getElementById('master-list-container');
            const dryCategories = ['pasta', 'bevande', 'condimenti', 'dispensa', 'farine', 'colazione', 'panificati', 'vegano', 'animali', 'igiene-p', 'igiene-c'];
            
            let dryMap = {};
            let freshMap = {};
            
            allOrders.forEach(o => {
                if (o.order_data.status === 'nuovo' || o.order_data.status === 'in preparazione') {
                    o.order_data.items.forEach(i => {
                        let map = dryCategories.includes(i.c) ? dryMap : freshMap;
                        if (!map[i.n]) map[i.n] = { q: 0, ean: i.ean, size: i.l || i.size };
                        map[i.n].q += i.q;
                    });
                }
            });

            let html = "";
            
            // Sezione SECCO
            if (Object.keys(dryMap).length > 0) {
                html += `<h4 style="color:var(--primary); margin-bottom:10px;">📦 BOXING SECCO</h4>`;
                Object.keys(dryMap).sort().forEach(name => {
                    html += `
                        <div class="master-item">
                            <div>
                                <div style="font-weight:800; font-size:16px;">${dryMap[name].q}x</div>
                                <div style="font-size:14px;">${name} ${dryMap[name].size ? '('+dryMap[name].size+')' : ''}</div>
                                <div style="font-size:11px; color:var(--text-muted);">EAN: ${dryMap[name].ean || 'N/A'}</div>
                            </div>
                        </div>`;
                });
            }

            // Sezione FRESCO
            if (Object.keys(freshMap).length > 0) {
                html += `<h4 style="color:var(--success); margin:25px 0 10px 0;">🥗 BOXING FRESCO</h4>`;
                Object.keys(freshMap).sort().forEach(name => {
                    html += `
                        <div class="master-item" style="border-left: 4px solid var(--success);">
                            <div>
                                <div style="font-weight:800; font-size:16px;">${freshMap[name].q}x</div>
                                <div style="font-size:14px;">${name} ${freshMap[name].size ? '('+freshMap[name].size+')' : ''}</div>
                                <div style="font-size:11px; color:var(--text-muted);">EAN: ${freshMap[name].ean || 'N/A'}</div>
                            </div>
                        </div>`;
                });
            }

            container.innerHTML = html || "<div style='text-align:center; padding:50px; color:var(--text-muted);'>Nulla da prelevare al momento.</div>";
        }

            container.innerHTML = html || "<div style='text-align:center; padding:50px; color:var(--text-muted);'>Nulla da prelevare al momento.</div>";
        }

        function openOrder(id) {
            currentOrder = allOrders.find(o => o.id === id);
            checkedItems = new Set();
            renderChecklist();
            document.getElementById('modalChecklist').style.display = 'flex';
            
            // Se l'ordine è nuovo, lo mettiamo in "in preparazione" appena lo apriamo
            if (!currentOrder.order_data.status || currentOrder.order_data.status === 'nuovo') {
                setStatus('in preparazione');
            }
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-items');
            const d = currentOrder.order_data;
            let html = "";
            
            d.items.forEach((item, index) => {
                const isChecked = checkedItems.has(index);
                html += `
                    <div class="item-row ${isChecked ? 'checked' : ''}">
                        <img src="${item.img || 'img/placeholder.png'}" class="item-img">
                        <div class="item-info">
                            <div class="item-name">${item.q}x ${item.n}</div>
                            <div class="item-ean">${item.l || item.size || ''} | EAN: ${item.ean || 'N/A'} | €${item.p.toFixed(2)}</div>
                        </div>
                        <div class="item-controls">
                            <button class="btn-delete" onclick="removeItem(${index})">🗑️</button>
                            <button class="btn-check ${isChecked ? 'active' : ''}" onclick="toggleCheck(${index})">✓</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('checklist-total').innerText = "Totale: " + d.total_amount.toFixed(2) + "€";
            document.getElementById('checklist-subtitle').innerText = `${checkedItems.size} di ${d.items.length} prodotti spuntati`;
            
            // Gestione bottoni azione
            const allChecked = checkedItems.size === d.items.length && d.items.length > 0;
            const btnPrep = document.getElementById('btn-finish-preparazione');
            const btnDeliv = document.getElementById('btn-finish-delivery');
            
            if (d.status === 'da consegnare') {
                btnPrep.style.display = 'none';
                btnDeliv.style.display = 'block';
            } else {
                btnPrep.style.display = allChecked ? 'block' : 'none';
                btnDeliv.style.display = 'none';
            }
        }

        function toggleCheck(index) {
            if (checkedItems.has(index)) checkedItems.delete(index);
            else checkedItems.add(index);
            renderChecklist();
        }

        async function removeItem(index) {
            if (confirm("Sei sicuro di voler rimuovere questo prodotto? Il totale verrà ricalcolato.")) {
                const item = currentOrder.order_data.items[index];
                currentOrder.order_data.items.splice(index, 1);
                
                // Ricalcolo totale
                currentOrder.order_data.total_amount = currentOrder.order_data.items.reduce((acc, i) => acc + (i.p * i.q), 0);
                
                // Se è il primo ordine del mese e abbiamo l'abbonamento nel totale originale...
                // Qui servirebbe una logica più fine se vogliamo gestire l'abbonamento separato.
                // Per ora ricalcoliamo puramente i prodotti.
                
                await saveOrder();
                checkedItems.delete(index);
                renderChecklist();
            }
        }

        async function setStatus(newStatus) {
            currentOrder.order_data.status = newStatus;
            await saveOrder();
            renderChecklist();
            loadData(); // Ricarica liste sotto
        }

        async function saveOrder() {
            try {
                const { error } = await sb.from('orders').update({ order_data: currentOrder.order_data }).eq('id', currentOrder.id);
                if (error) throw error;
            } catch (err) {
                alert("Errore salvataggio: " + err.message);
            }
        }

        async function finishOrder() {
            if (confirm("Confermi la consegna e l'incasso? L'ordine verrà archiviato.")) {
                currentOrder.order_data.status = 'concluso';
                await saveOrder();
                
                // Innesco ricevuta via Resend (Edge Function)
                // Usiamo la stessa funzione send-welcome con un nuovo type se necessario, 
                // o semplicemente ri-inviamo il riepilogo finale.
                triggerReceipt();
                
                closeChecklist();
                loadData();
            }
        }

        function triggerReceipt() {
            const d = currentOrder.order_data;
            fetch("https://uldpnhmdjbbwwqwjsdoh.supabase.co/functions/v1/send-welcome", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` },
                body: JSON.stringify({
                    type: 'order',
                    name: d.name || 'Cliente',
                    email: d.email || '', // Se salvata nel JSON
                    delivery: d.delivery,
                    address: d.address,
                    items: d.items,
                    total: "Totale Finale: " + d.total_amount.toFixed(2) + "€"
                })
            }).catch(console.error);
        }

        function closeChecklist() {
            document.getElementById('modalChecklist').style.display = 'none';
        }

        // Auto-refresh ogni 30 secondi
        setInterval(loadData, 30000);
        
        init();

    </script>
</body>
</html>
