<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPESINA Shopper - Dashboard Operativa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --dark: #0f172a;
            --dark-lighter: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --red: #ef4444;
            --blue: #3b82f6;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background: var(--dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation; /* Migliora reattività touch */
        }

        header {
            background: var(--dark-lighter);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 800; font-size: 18px; color: white; }
        .logo span { color: var(--primary); }

        .date-strip {
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            background: var(--dark);
            scrollbar-width: none;
        }
        .date-strip::-webkit-scrollbar { display: none; }

        .date-btn {
            min-width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--dark-lighter);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
        }

        .date-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .date-btn span { font-size: 10px; opacity: 0.7; font-weight: 400; }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .picking-col {
            width: 45%;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        .boxing-col {
            width: 55%;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.02);
        }

        .col-header {
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Picking List Items */
        .picking-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--dark-lighter);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .picking-item img {
            width: 35px;
            height: 35px;
            object-fit: contain;
            background: white;
            border-radius: 6px;
        }

        .picking-qty {
            background: var(--accent);
            color: var(--dark);
            min-width: 24px;
            height: 24px;
            padding: 0 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 12px;
        }

        /* Order Cards */
        .order-card {
            background: var(--dark-lighter);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
            position: relative;
            z-index: 5;
        }

        .order-card:active {
            transform: scale(0.98);
            background: #2d3748;
        }

        .order-info h3 { margin: 0; font-size: 16px; font-weight: 800; color: white; }
        .order-info p { margin: 2px 0; font-size: 12px; color: var(--text-muted); }

        .btn-avvia {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 12px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
        }

        .order-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Detail View */
        #order-detail-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--dark-lighter);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: opacity 0.3s;
        }

        .item-row.checked {
            opacity: 0.3; /* Effetto opaco richiesto */
            border: 1px solid var(--primary);
        }

        .item-row img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            background: white;
            border-radius: 8px;
        }

        .checkbox-custom {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-row.checked .checkbox-custom {
            background: var(--primary);
            border-color: var(--primary);
        }

        .btn {
            padding: 15px;
            border-radius: 14px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: white;
        }

        .btn-maps { background: var(--blue); flex: 1; }
        .btn-call { background: var(--primary); flex: 1; }
        .btn-delivery { background: var(--primary); width: 100%; margin-top: 15px; font-size: 16px; }
        .btn-close { background: var(--accent); color: var(--dark); width: 100%; margin-top: 10px; font-size: 16px; }
        
        .btn:disabled { opacity: 0.2; }

    </style>
</head>
<body>

    <header>
        <div class="logo">SPESINA <span>SHOPPER</span></div>
        <button onclick="loadData()" style="background:none; border:none; color:var(--primary); font-size:20px;">🔄</button>
    </header>

    <div class="date-strip" id="date-strip">
        <!-- Pulsanti numerici popolati da JS -->
    </div>

    <div class="main-container">
        <div class="picking-col">
            <div class="col-header">Picking (Dry)</div>
            <div class="scroll-area" id="picking-list"></div>
        </div>
        <div class="boxing-col">
            <div class="col-header">Ordini</div>
            <div class="scroll-area" id="orders-list"></div>
        </div>
    </div>

    <!-- Sezione Dettaglio Ordine (Overlay) -->
    <div id="order-detail-overlay" style="display:none;">
        <div style="padding:20px; background:var(--dark); color:white; display:flex; justify-content:space-between; align-items:center;">
            <h3 id="det-order-id" style="margin:0;">Ordine #---</h3>
            <button onclick="closeDetail()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <div class="scroll-area">
            <div style="margin-bottom:25px;">
                <h2 id="det-customer" style="margin:0 0 5px 0;">Nome Cliente</h2>
                <div id="det-address" style="color:#64748b; font-weight:500; font-size:15px;">Via Indirizzo, Mestre</div>
                
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <a id="det-maps-link" href="#" target="_blank" class="btn btn-maps">📍 Naviga</a>
                    <a id="det-phone-link" href="#" class="btn btn-call">📞 Chiama</a>
                </div>
            </div>

            <h4 style="border-bottom:2px solid rgba(255,255,255,0.1); padding-bottom:10px; margin-bottom:15px; color:var(--primary);">COMPOSIZIONE SCATOLA</h4>
            <div id="det-items-list">
                <!-- Lista prodotti dell'ordine -->
            </div>

            <div id="det-actions" style="margin-top:30px; padding:20px; background:var(--dark-lighter); border-radius:16px; border:1px solid rgba(255,255,255,0.1);">
                <button id="btn-start-delivery" class="btn btn-delivery" disabled onclick="updateOrderStatus('in_consegna')">📦 INIZIA CONSEGNA</button>
                <button id="btn-complete-order" class="btn btn-close" style="display:none;" onclick="updateOrderStatus('completato')">💰 INCASSA E CHIUDI</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://uldpnhmdjbbwwqwjsdoh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsZHBuaG1kamJid3dxd2pzZG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDE5ODQsImV4cCI6MjA5MjQxNzk4NH0.yXcJBcZtiaDbPl2IyDUBK-Ndoyu0unmEzfY8xZrogzM";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allOrders = [];
        let selectedOrder = null;
        let checkedItems = new Set();

        let selectedDate = "ALL";

        function initDateSelector() {
            const strip = document.getElementById('date-strip');
            const days = ["Dom", "Lun", "Mar", "Mer", "Gio", "Ven", "Sab"];
            
            // Pulsante ALL
            const btnAll = document.createElement('div');
            btnAll.className = "date-btn active";
            btnAll.innerHTML = `ALL<span>Sett.</span>`;
            btnAll.onclick = () => selectDate("ALL", btnAll);
            strip.appendChild(btnAll);

            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dayNum = d.getDate();
                const dayName = days[d.getDay()];
                const fullVal = `${["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"][d.getDay()]} ${dayNum} ${["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"][d.getMonth()]}`;
                
                const btn = document.createElement('div');
                btn.className = "date-btn";
                btn.innerHTML = `${dayNum}<span>${dayName}</span>`;
                btn.onclick = () => selectDate(fullVal, btn);
                strip.appendChild(btn);
            }
        }

        function selectDate(val, btn) {
            selectedDate = val;
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadData();
        }

        async function loadData() {
            const { data, error } = await sb.from('orders')
                .select('*')
                .neq('order_data->>status', 'completato')
                .order('created_at', { ascending: false });

            if (error) return console.error(error);

            if (selectedDate === "ALL") {
                allOrders = data;
            } else {
                allOrders = data.filter(o => o.order_data.delivery && o.order_data.delivery.startsWith(selectedDate));
            }

            allOrders.sort((a, b) => {
                const getHour = (s) => parseInt(s.split(' ').slice(-1)[0].split(':')[0]) || 0;
                return getHour(a.order_data.delivery) - getHour(b.order_data.delivery);
            });
            
            renderPicking();
            renderOrders();
        }

        function renderPicking() {
            const pickingList = document.getElementById('picking-list');
            const dryProducts = {};

            allOrders.forEach(order => {
                const items = order.order_data.items || [];
                items.forEach(item => {
                    const cat = (item.c || "").toLowerCase();
                    if (cat !== 'freschi' && cat !== 'orto' && cat !== 'surgelati') {
                        const key = item.ean || item.n;
                        if (!dryProducts[key]) {
                            dryProducts[key] = { n: item.n, b: item.b || '', q: 0, img: item.img, ean: item.ean };
                        }
                        dryProducts[key].q += (item.q || 1);
                    }
                });
            });

            const itemsArray = Object.values(dryProducts);
            pickingList.innerHTML = itemsArray.length === 0 ? '<div style="font-size:10px; color:var(--text-muted); text-align:center; padding:20px;">Vuoto</div>' : 
                itemsArray.map(item => `
                <div class="picking-item">
                    <div class="picking-qty">${item.q}</div>
                    <img src="${item.img || 'img/placeholder.png'}" onerror="this.src='https://uldpnhmdjbbwwqwjsdoh.supabase.co/storage/v1/object/public/products/sub_icon.png'">
                    <div style="flex:1;">
                        <div style="font-weight:700; font-size:11px; line-height:1.2;">${item.b ? item.b + ' ' : ''}${item.n}</div>
                        <div style="font-size:9px; color:var(--text-muted);">EAN: ${item.ean || 'N/D'}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderOrders() {
            const ordersList = document.getElementById('orders-list');
            ordersList.innerHTML = allOrders.length === 0 ? '<div style="font-size:12px; color:var(--text-muted); text-align:center; padding:20px;">Nessun ordine</div>' :
                allOrders.map(o => {
                const d = o.order_data;
                const status = d.status || 'nuovo';
                const shortId = o.id.toString().slice(0, 8).toUpperCase();
                return `
                    <div class="order-card" onclick="openDetail(${o.id})">
                        <div class="order-meta">
                            <span style="color:var(--primary); font-weight:900; font-size:12px;">#${shortId}</span>
                            <span class="status-badge status-${status}">${status}</span>
                        </div>
                        <div class="order-info">
                            <h3>${d.name}</h3>
                            <p>📍 ${d.address}</p>
                            <p>🕒 Slot: ${d.delivery.split(' ').slice(-1)[0]}</p>
                        </div>
                        <button class="btn-avvia">AVVIA ORDINE</button>
                    </div>
                `;
            }).join('');
        }

        function openDetail(orderId) {
            selectedOrder = allOrders.find(o => o.id === orderId);
            if (!selectedOrder) return;

            const d = selectedOrder.order_data;
            const shortId = selectedOrder.id.toString().slice(0, 8).toUpperCase();
            
            document.getElementById('det-order-id').innerText = `#${shortId}`;
            document.getElementById('det-customer').innerText = d.name;
            document.getElementById('det-address').innerText = d.address;
            document.getElementById('det-maps-link').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address_full || d.address)}`;
            document.getElementById('det-phone-link').href = `tel:${d.phone}`;
            
            checkedItems.clear();
            renderItemsDetail(d.items);
            
            const status = d.status || 'nuovo';
            const btnStart = document.getElementById('btn-start-delivery');
            const btnComplete = document.getElementById('btn-complete-order');

            if (status === 'in_consegna') {
                btnStart.style.display = 'none';
                btnComplete.style.display = 'block';
            } else {
                btnStart.style.display = 'block';
                btnStart.disabled = true;
                btnComplete.style.display = 'none';
            }

            document.getElementById('order-detail-overlay').style.display = 'flex';
        }

        function renderItemsDetail(items) {
            const list = document.getElementById('det-items-list');
            list.innerHTML = items.map((item, idx) => `
                <div class="item-row" id="item-row-${idx}" onclick="toggleItem(${idx})">
                    <div class="checkbox-custom"></div>
                    <img src="${item.img || 'https://uldpnhmdjbbwwqwjsdoh.supabase.co/storage/v1/object/public/products/sub_icon.png'}" onerror="this.src='https://uldpnhmdjbbwwqwjsdoh.supabase.co/storage/v1/object/public/products/sub_icon.png'">
                    <div style="flex:1;">
                        <div style="font-weight:800; font-size:14px;">${item.q}x ${item.n}</div>
                        <div style="font-size:10px; color:var(--text-muted);">${item.b || ''} | EAN: ${item.ean || 'N/D'}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleItem(idx) {
            const row = document.getElementById(`item-row-${idx}`);
            if (checkedItems.has(idx)) {
                checkedItems.delete(idx);
                row.classList.remove('checked');
            } else {
                checkedItems.add(idx);
                row.classList.add('checked');
            }

            const totalItems = selectedOrder.order_data.items.length;
            const btn = document.getElementById('btn-start-delivery');
            btn.disabled = (checkedItems.size < totalItems);
        }

        async function updateOrderStatus(newStatus) {
            if (!selectedOrder) return;

            const updatedData = { ...selectedOrder.order_data, status: newStatus };
            
            const { error } = await sb.from('orders')
                .update({ order_data: updatedData })
                .eq('id', selectedOrder.id);

            if (error) {
                alert("Errore aggiornamento ordine: " + error.message);
                return;
            }

            if (newStatus === 'completato') {
                sendThanksEmail(updatedData);
                alert("✅ Ordine Chiuso! Email di ringraziamento inviata.");
                closeDetail();
            } else {
                alert("🚀 Consegna avviata!");
                openDetail(selectedOrder.id); // Refresh view
            }
            
            loadData(); // Refresh lists
        }

        async function sendThanksEmail(data) {
            try {
                await fetch("https://uldpnhmdjbbwwqwjsdoh.supabase.co/functions/v1/send-welcome", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
                    body: JSON.stringify({
                        type: 'thanks',
                        name: data.name,
                        email: data.email,
                        total: data.total
                    })
                });
            } catch (err) { console.error("Errore invio email ringraziamento:", err); }
        }

        function closeDetail() {
            document.getElementById('order-detail-overlay').style.display = 'none';
            selectedOrder = null;
        }

        // Init
        initDateSelector();
        loadData();
    </script>
</body>
</html>
