name: Process Nuovo Prodotto

on:
  repository_dispatch:
    types: [nuovo_prodotto]

jobs:
  elabora-foto-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # Velocizza le installazioni successive

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests rembg pillow onnxruntime

      - name: Elabora prodotti (mass_image_hunter)
        run: python mass_image_hunter.py

      - name: Salva foto su GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Spesina AI Bot"
          git add img/
          git commit -m "🤖 Aggiunte nuove foto scontornate AI" || echo "Nessuna nuova foto da salvare"
          git push
