<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesina V2.2</title>
    <style>
        :root { --primary: #2ecc71; --gray: #f8fafc; }
        body { font-family: sans-serif; margin: 0; background: var(--gray); padding-bottom: 100px; text-align: center; }
        header { background: white; padding: 20px; border-bottom: 2px solid #2ecc71; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 12px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* Immagini con dimensioni bloccate */
        .card img { 
            width: 100% !important; 
            height: 120px !important; 
            object-fit: cover !important; 
            border-radius: 10px; 
            background: #eee;
            margin-bottom: 10px;
            display: block;
        }
        button { background: #2ecc71; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h2 style="color:#2ecc71; margin:0;">Spesina V2.2 🛒</h2>
    <p style="font-size:12px; color:gray;">Se leggi V2.2 e non vedi foto, svuota la cache del telefono.</p>
</header>

<div class="catalog" id="catalog"></div>

<script>
    // Link diretti da Wikimedia Commons (più sicuri per GitHub Pages)
    const PRODS = [
        { id: 1, n: "Pasta Penne", p: 0.95, img: "https://wikimedia.org" },
        { id: 2, n: "Acqua Naturale", p: 0.45, img: "https://wikimedia.org" },
        { id: 3, n: "Mele Rosse", p: 1.20, img: "https://wikimedia.org" },
        { id: 4, n: "Carne Bovina", p: 5.50, img: "https://wikimedia.org" }
    ];

    function draw() {
        let html = "";
        PRODS.forEach(p => {
            html += `
            <div class="card">
                <img src="${p.img}" alt="${p.n}">
                <div style="font-weight:bold; margin-bottom:5px;">${p.n}</div>
                <div style="color:#27ae60; margin-bottom:10px;">${p.p.toFixed(2)}€</div>
                <button onclick="alert('Aggiunto!')">Aggiungi</button>
            </div>`;
        });
        document.getElementById('catalog').innerHTML = html;
    }

    // Forza il caricamento al termine del caricamento della pagina
    window.addEventListener('load', draw);
</script>

</body>
</html>
