<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesina V2.1</title> <!-- Se vedi V2.1 nel titolo, il sito è aggiornato -->
    <style>
        :root { --primary: #2ecc71; --gray: #f8fafc; }
        body { font-family: sans-serif; margin: 0; background: var(--gray); padding-bottom: 100px; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #ddd; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #eee; }
        /* Stile forzato per le immagini */
        .card img { 
            width: 100% !important; 
            height: 110px !important; 
            display: block !important; 
            object-fit: cover; 
            border-radius: 8px; 
            background: #ccc; 
            margin-bottom: 10px;
        }
        #cart-trigger { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #27ae60; color: white; padding: 15px 30px; border-radius: 50px; 
            font-weight: bold; display: none; z-index: 100; width: 80%; text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h2 style="color:var(--primary); margin:0;">Spesina V2.1 🛒</h2>
    <p style="font-size:10px; color:gray;">Se leggi V2.1 le immagini devono apparire</p>
</header>

<div class="catalog" id="catalog"></div>
<div id="cart-trigger" onclick="alert('Carrello aperto')">VEDI CARRELLO</div>

<script>
    // Immagini ultra-stabili da un servizio diverso (Lorem Flickr)
    const PRODS = [
        { id: 1, n: "Pasta Penne", p: 0.95, img: "https://loremflickr.com" },
        { id: 2, n: "Acqua Naturale", p: 0.45, img: "https://loremflickr.com" },
        { id: 3, n: "Mele Rosse", p: 1.20, img: "https://loremflickr.com" },
        { id: 4, n: "Carne Bovina", p: 5.50, img: "https://loremflickr.com" }
    ];

    function render() {
        let html = "";
        PRODS.forEach(p => {
            html += `
            <div class="card">
                <img src="${p.img}" alt="prodotto">
                <div style="font-weight:bold; font-size:14px;">${p.n}</div>
                <div style="color:green;">${p.p.toFixed(2)}€</div>
                <button onclick="document.getElementById('cart-trigger').style.display='block'" style="margin-top:5px; background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Aggiungi</button>
            </div>`;
        });
        document.getElementById('catalog').innerHTML = html;
    }

    // Carica i prodotti appena la pagina è pronta
    window.onload = render;
</script>

</body>
</html>
