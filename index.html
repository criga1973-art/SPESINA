<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesina V2.3</title>
    <style>
        :root { --primary: #2ecc71; --gray: #f8fafc; }
        body { font-family: sans-serif; margin: 0; background: var(--gray); padding-bottom: 100px; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Stile per l'icona Emoji gigante al posto della foto */
        .product-emoji { 
            font-size: 60px; 
            height: 100px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #f1f2f6;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; }
        #cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; display: none; width: 80%; text-align: center; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header>
    <h2 style="color:var(--primary); margin:0;">Spesina V2.3 🛒</h2>
    <p style="font-size:11px; color:gray;">Versione con icone integrate (ultra-veloce)</p>
</header>

<div class="catalog" id="catalog"></div>
<div id="cart-bar" onclick="alert('Ordine inviato!')">CONFERMA ORDINE</div>

<script>
    const PRODS = [
        { id: 1, n: "Pasta Penne", p: 0.95, icon: "🍝" },
        { id: 2, n: "Acqua Naturale", p: 0.45, icon: "💧" },
        { id: 3, n: "Mele Rosse", p: 1.20, icon: "🍎" },
        { id: 4, n: "Carne Bovina", p: 5.50, icon: "🥩" },
        { id: 5, n: "Latte Intero", p: 1.30, icon: "🥛" },
        { id: 6, n: "Uova Fresche", p: 2.10, icon: "🥚" },
        { id: 7, n: "Pane Fresco", p: 1.50, icon: "🥖" },
        { id: 8, n: "Burger Veg", p: 2.99, icon: "🥦" }
    ];

    function draw() {
        let html = "";
        PRODS.forEach(p => {
            html += `
            <div class="card">
                <div class="product-emoji">${p.icon}</div>
                <div style="font-weight:bold; margin-bottom:5px;">${p.n}</div>
                <div style="color:#27ae60; font-weight:bold; margin-bottom:10px;">${p.p.toFixed(2)}€</div>
                <button onclick="document.getElementById('cart-bar').style.display='block'">Aggiungi</button>
            </div>`;
        });
        document.getElementById('catalog').innerHTML = html;
    }

    window.onload = draw;
</script>

</body>
</html>
