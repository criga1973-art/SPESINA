<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesina - Ordina su WhatsApp</title>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --gray: #f8fafc; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--gray); display: flex; flex-direction: column; height: 100vh; }
        
        header { background: white; padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        .top-nav { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .top-nav a { text-decoration: none; color: var(--dark); font-size: 14px; font-weight: 600; padding: 5px 15px; border-radius: 20px; transition: 0.2s; }
        .top-nav a:hover { background: #eee; }

        .categories-bar { background: white; padding: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cat-btn { background: #e2e8f0; color: var(--dark); border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .cat-btn:hover { background: var(--primary); color: white; }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        .catalog { flex: 3; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .card { background: white; border-radius: 15px; padding: 15px; text-align: center; position: relative; border: 1px solid #eee; }
        .card img { width: 70px; height: 70px; margin-bottom: 10px; opacity: 0.7; }
        .qty-label { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 18px; }
        
        .sidebar { flex: 1; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; min-width: 300px; }
        .cart-items { flex: 1; overflow-y: auto; font-size: 14px; margin-top: 15px; }
        .total-box { border-top: 3px solid var(--primary); padding-top: 15px; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }

        .qty-popup { display: none; position: absolute; top: 40px; right: 10px; background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Modal Pagamento */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; width: 300px; }
        .pay-option { border: 2px solid #eee; margin: 10px 0; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .pay-option:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; color:var(--primary)">Spesina 🛒</h1>
    <div class="top-nav">
        <a href="#">Come funziona</a>
        <a href="#">Dove consegniamo</a>
        <a href="#">Fai la spesa</a>
    </div>
</header>

<div class="categories-bar">
    <button class="cat-btn">Detergenza</button>
    <button class="cat-btn">Pasta</button>
    <button class="cat-btn">Riso</button>
    <button class="cat-btn">Bevande</button>
    <button class="cat-btn">Sughi</button>
</div>

<div class="main-content">
    <div class="catalog" id="catalog"></div>
    <div class="sidebar">
        <h3 style="margin:0">🛒 Il tuo Carrello</h3>
        <div id="cart-items" class="cart-items"><p style="color:#999">Carrello vuoto...</p></div>
        <div class="total-box">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span>Totale:</span>
                <span id="grand-total" style="font-weight:bold; font-size:20px">0.00€</span>
            </div>
            <!-- PULSANTE ATTIVATO -->
            <button class="btn-buy" onclick="openPayment()">CONFERMA ORDINE</button>
        </div>
    </div>
</div>

<!-- FINESTRA PAGAMENTO -->
<div class="modal" id="paymentModal">
    <div class="modal-content">
        <h3>Scegli il pagamento</h3>
        <div class="pay-option" onclick="sendWhatsApp('Contanti alla consegna')">💵 Cash (allo shopper)</div>
        <div class="pay-option" onclick="sendWhatsApp('Bancomat/Carta')">💳 Bancomat (al POS)</div>
        <button onclick="closePayment()" style="margin-top:10px; border:none; background:none; color:#999; cursor:pointer">Annulla</button>
    </div>
</div>

<script>
    // INSERISCI IL TUO NUMERO QUI SOTTO (senza +)
    const TUO_NUMERO = "393331234567"; 

    const products = [
        { id: 1, name: "Pasta Bucatini", price: 0.99, cat: "Pasta" },
        { id: 2, name: "Birra Moretti", price: 1.19, cat: "Bevande" },
        { id: 3, name: "Sugo pronto", price: 1.50, cat: "Sughi" },
        { id: 4, name: "Detersivo Piatti", price: 2.30, cat: "Detergenza" },
        { id: 5, name: "Riso Arborio", price: 2.10, cat: "Riso" }
    ];

    let cart = [];
    const icon = "https://flaticon.com";

    function renderCatalog() {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = products.map(p => `
            <div class="card">
                <div class="qty-label" onclick="togglePopup(${p.id})">+</div>
                <div id="popup-${p.id}" class="qty-popup">
                    <input type="number" id="input-${p.id}" value="1" style="width:40px">
                    <button onclick="addToCart(${p.id})" style="background:var(--primary); color:white; border:none; padding:5px; border-radius:5px; cursor:pointer">OK</button>
                </div>
                <img src="${icon}">
                <p style="font-size:13px; font-weight:600; margin:5px 0">${p.name}</p>
                <p style="color:var(--primary); font-weight:bold; margin:0">${p.price.toFixed(2)}€</p>
            </div>
        `).join('');
    }

    function togglePopup(id) {
        const p = document.getElementById(`popup-${id}`);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function addToCart(id) {
        const qty = parseInt(document.getElementById(`input-${id}`).value);
        const p = products.find(prod => prod.id === id);
        const exists = cart.find(item => item.id === id);
        if(exists) exists.qty += qty; else cart.push({...p, qty});
        togglePopup(id);
        updateCart();
    }

    function updateCart() {
        const container = document.getElementById('cart-items');
        let total = 0;
        if(cart.length === 0) {
            container.innerHTML = '<p style="color:#999">Il carrello è vuoto...</p>';
        } else {
            container.innerHTML = cart.map(i => {
                total += (i.price * i.qty);
                return `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>${i.qty}x ${i.name}</span>
                    <span>${(i.price * i.qty).toFixed(2)}€</span>
                </div>`;
            }).join('');
        }
        document.getElementById('grand-total').innerText = total.toFixed(2) + '€';
    }

    function openPayment() { if(cart.length > 0) document.getElementById('paymentModal').style.display = 'flex'; }
    function closePayment() { document.getElementById('paymentModal').style.display = 'none'; }

    function sendWhatsApp(metodo) {
        let messaggio = "*NUOVO ORDINE SPESINA*\n\n";
        cart.forEach(i => { messaggio += `• ${i.qty}x ${i.name} (${(i.price * i.qty).toFixed(2)}€)\n`; });
        messaggio += `\n*TOTALE: ${document.getElementById('grand-total').innerText}*`;
        messaggio += `\n*PAGAMENTO:* ${metodo}`;
        
        window.open(`https://wa.me{TUO_NUMERO}?text=${encodeURIComponent(messaggio)}`, '_blank');
        closePayment();
    }

    renderCatalog();
</script>
</body>
</html>
