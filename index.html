<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesina - La tua spesa</title>
    <style>
        /* Grafica "Spesina" Integrata */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        header { background: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); sticky: top; }
        .logo { font-size: 24px; font-weight: bold; color: #2ecc71; text-decoration: none; }
        .banner { background: #2ecc71; color: white; padding: 30px 20px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        /* Scheda Prodotto */
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { max-width: 100%; height: 180px; object-fit: contain; margin-bottom: 15px; }
        .brand { font-size: 12px; color: #999; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .title { font-size: 18px; font-weight: bold; color: #333; margin: 0 0 10px 0; text-align: center; }
        .price { font-size: 22px; color: #2ecc71; font-weight: bold; margin-bottom: 15px; }
        
        /* Pulsante WhatsApp */
        .btn-wa { background-color: #25D366; color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box; display: inline-block; }
        footer { text-align: center; padding: 40px; color: #888; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Spesina 🛒</div>
        <a href="https://wa.me" style="font-size: 12px; color: #666; text-decoration: none;">Serve aiuto? Scrivici</a>
    </header>

    <div class="banner">
        <h2 style="margin:0">La tua spesa in un click!</h2>
        <p style="margin:5px 0 0">Ordina ora e ricevi tutto a casa.</p>
    </div>

    <div class="container">
        <!-- Prodotto 1 -->
        <div class="card">
            <img src="https://conad.it" alt="Pasta">
            <div class="brand">Barilla</div>
            <h3 class="title">Pasta Bucatini n.9</h3>
            <div class="price">0,99€</div>
            <a href="https://wa.me?text=Vorrei%20ordinare:%20Bucatini%20n.9" class="btn-wa">Ordina su WhatsApp</a>
        </div>

        <!-- Prodotto 2 -->
        <div class="card">
            <img src="https://conad.it" alt="Birra">
            <div class="brand">Moretti</div>
            <h3 class="title">Birra Ricetta Originale</h3>
            <div class="price">1,19€</div>
            <a href="https://wa.me?text=Vorrei%20ordinare:%20Birra%20Moretti" class="btn-wa">Ordina su WhatsApp</a>
        </div>
    </div>

    <footer>
        &copy; 2024 Spesina - Consegna a domicilio e pagamento al POS
    </footer>

</body>
</html>
