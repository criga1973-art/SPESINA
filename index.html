<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesina - La tua spesa</title>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --gray: #f8fafc; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--gray); display: flex; flex-direction: column; height: 100vh; }
        header { background: white; padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        .top-nav { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .top-nav a { text-decoration: none; color: var(--dark); font-size: 14px; font-weight: 600; padding: 5px 15px; border-radius: 20px; }
        .categories-bar { background: white; padding: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cat-btn { background: #e2e8f0; color: var(--dark); border: none; padding: 8px 20px; border-radius: 25px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .main-content { display: flex; flex: 1; overflow: hidden; }
        .catalog { flex: 3; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; text-align: center; position: relative; border: 1px solid #eee; }
        .card img { width: 60px; height: 60px; margin-bottom: 10px; }
        .qty-label { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .sidebar { flex: 1; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; min-width: 280px; }
        .cart-items { flex: 1; overflow-y: auto; font-size: 14px; }
        .total-box { border-top: 3px solid var(--primary); padding-top: 15px; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .qty-popup { display: none; position: absolute; top: 40px; right: 10px; background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; width: 280px; }
        .pay-option { border: 2px solid #eee; margin: 10px 0; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; color:var(--primary)">Spesina 🛒</h1>
    <div class="top-nav">
        <a href="#">Come funziona</a> <a href="#">Dove consegniamo</a> <a href="#">Fai la spesa</a>
    </div>
</header>

<div class="categories-bar">
    <button class="cat-btn">Pasta</button> <button class="cat-btn">Bevande</button> <button class="cat-btn">Sughi</button> <button class="cat-btn">Detergenza</button> <button class="cat-btn">Riso</button>
</div>

<div class="main-content">
    <div class="catalog" id="catalog"></div>
    <div class="sidebar">
        <h3 style="margin:0">Carrello</h3>
        <div id="cart-items" class="cart-items"><p style="color:#999">Vuoto</p></div>
        <div class="total-box">
            <p>Totale: <span id="grand-total" style="font-weight:bold">0.00€</span></p>
            <button class="btn-buy" onclick="openPayment()">CONFERMA ORDINE</button>
        </div>
    </div>
</div>

<div class="modal" id="paymentModal">
    <div class="modal-content">
        <h3>Pagamento</h3>
        <div class="pay-option" onclick="sendWhatsApp('Contanti')">💵 Cash</div>
        <div class="pay-option" onclick="sendWhatsApp('Bancomat')">💳 Bancomat</div>
        <button onclick="closePayment()" style="border:none; background:none; color:#999; cursor:pointer">Indietro</button>
    </div>
</div>

<script>
    // INSERISCI QUI IL TUO NUMERO (Solo cifre, es: 393331234567)
    const MY_NUMBER = "393459846663"; 

    const products = [
        { id: 1, name: "Bucatini n.9", price: 0.99 },
        { id: 2, name: "Moretti 66cl", price: 1.19 },
        { id: 3, name: "Sugo Pomodoro", price: 1.50 },
        { id: 4, name: "Sgrassatore", price: 2.30 },
        { id: 5, name: "Riso Arborio", price: 2.10 },
        { id: 6, name: "Spaghetti n.5", price: 0.99 },
        { id: 7, name: "Vino Rosso", price: 4.50 },
        { id: 8, name: "Acqua Naturale", price: 0.40 },
        { id: 9, name: "Biscotti", price: 2.50 },
        { id: 10, name: "Sale Grosso", price: 0.60 },
        { id: 11, name: "Caffè 250g", price: 3.20 },
        { id: 12, name: "Olio EVO", price: 8.90 },
        { id: 13, name: "Tonno 3x80g", price: 3.50 },
        { id: 14, name: "Farina 00", price: 1.10 },
        { id: 15, name: "Latte 1L", price: 1.40 }
    ];

    let cart = [];
    const paperBag = "https://flaticon.com";

    function renderCatalog() {
        document.getElementById('catalog').innerHTML = products.map(p => `
            <div class="card">
                <div class="qty-label" onclick="togglePop(${p.id})">+</div>
                <div id="pop-${p.id}" class="qty-popup">
                    <input type="number" id="in-${p.id}" value="1" style="width:35px">
                    <button onclick="add(${p.id})" style="background:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer">OK</button>
                </div>
                <img src="${paperBag}">
                <p style="font-size:12px; font-weight:bold; margin:5px 0">${p.name}</p>
                <p style="color:var(--primary); font-weight:bold; margin:0">${p.price.toFixed(2)}€</p>
            </div>
        `).join('');
    }

    function togglePop(id) {
        const el = document.getElementById(`pop-${id}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function add(id) {
        const qty = parseInt(document.getElementById(`in-${id}`).value);
        const p = products.find(prod => prod.id === id);
        const item = cart.find(i => i.id === id);
        if(item) item.qty += qty; else cart.push({...p, qty});
        togglePop(id);
        updateCart();
    }

    function updateCart() {
        let total = 0;
        const container = document.getElementById('cart-items');
        if(cart.length === 0) container.innerHTML = '<p style="color:#999">Vuoto</p>';
        else {
            container.innerHTML = cart.map(i => {
                total += (i.price * i.qty);
                return `<div style="display:flex; justify-content:space-between; margin-bottom:5px"><span>${i.qty}x ${i.name}</span><span>${(i.price*i.qty).toFixed(2)}€</span></div>`;
            }).join('');
        }
        document.getElementById('grand-total').innerText = total.toFixed(2) + '€';
    }

    function openPayment() { if(cart.length > 0) document.getElementById('paymentModal').style.display = 'flex'; }
    function closePayment() { document.getElementById('paymentModal').style.display = 'none'; }

    function sendWhatsApp(m) {
        let txt = "*ORDINE SPESINA*\n\n";
        cart.forEach(i => { txt += `• ${i.qty}x ${i.name} (${(i.price*i.qty).toFixed(2)}€)\n`; });
        txt += `\n*TOTALE: ${document.getElementById('grand-total').innerText}*\n*PAGAMENTO:* ${m}`;
        window.open(`https://wa.me{MY_NUMBER}?text=${encodeURIComponent(txt)}`, '_blank');
        closePayment();
    }

    renderCatalog();
</script>
</body>
</html>
