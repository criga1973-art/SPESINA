<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesina - La tua spesa</title>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --gray: #f8fafc; --red: #ff7675; --dark-green: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--gray); padding-bottom: 100px; }
        header { background: white; padding: 15px; border-bottom: 1px solid #eee; text-align: center; position: sticky; top: 0; z-index: 100; }
        .top-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .top-nav a { text-decoration: none; color: var(--dark); font-size: 13px; font-weight: 600; cursor: pointer; }
        
        #cart-trigger { 
            display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--dark-green); color: white; padding: 18px 30px; border-radius: 50px; 
            font-weight: 800; cursor: pointer; box-shadow: 0 8px 25px rgba(0,0,0,0.3); z-index: 200; 
            width: 85%; max-width: 320px; text-align: center; font-size: 18px; border: 2px solid rgba(255,255,255,0.3);
        }

        .categories-bar { background: white; padding: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; border-bottom: 1px solid #eee; }
        .cat-btn { background: #e2e8f0; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; }
        
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #eee; position: relative; overflow: hidden; }
        .add-btn { position: absolute; top: 5px; right: 5px; background: var(--primary); color: white; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 20px; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; display: block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn-remove { background: var(--red); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .pay-option { border: 2px solid #eee; margin: 10px 0; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="cart-trigger" onclick="openCart()">
    VEDI CARRELLO: <span id="cart-total-top">0.00€</span>
</div>

<header>
    <h2 style="margin:0; color:var(--primary)">Spesina 🛒</h2>
    <div class="top-nav">
        <a onclick="showAddress()">📍 Dove consegniamo</a>
        <a onclick="showAddress()">🔑 Accedi</a>
    </div>
</header>

<div class="categories-bar">
    <button class="cat-btn" onclick="render('Tutti')">Tutti</button>
    <button class="cat-btn" onclick="render('Pasta')">Pasta</button>
    <button class="cat-btn" onclick="render('Bevande')">Bevande</button>
    <button class="cat-btn" onclick="render('Frutta e Verdura')">Frutta/Verdura</button>
    <button class="cat-btn" onclick="render('Carne e Pesce')">Carne/Pesce</button>
    <button class="cat-btn" onclick="render('Latticini')">Latticini</button>
    <button class="cat-btn" onclick="render('Uova')">Uova</button>
    <button class="cat-btn" onclick="render('Pane')">Pane</button>
    <button class="cat-btn" onclick="render('Vegano')">Vegano</button>
    <button class="cat-btn" onclick="render('Scatolame')">Scatolame</button>
</div>

<div class="catalog" id="catalog"></div>

<!-- Modals -->
<div class="modal" id="modalCart"><div class="modal-content"><h3>🛒 Carrello</h3><div id="cart-items-list"></div><h3 id="final-price">Totale: 0.00€</h3><button class="btn-confirm" onclick="showPay()">ORDINA</button><button onclick="closeModals()" style="border:none;background:none;color:gray;margin-top:10px;">Chiudi</button></div></div>
<div class="modal" id="modalPay"><div class="modal-content"><h3>Pagamento</h3><div class="pay-option" onclick="finish('Contanti')">💵 Contanti</div><div class="pay-option" onclick="finish('Bancomat')">💳 Bancomat</div></div></div>
<div class="modal" id="modalAddress"><div class="modal-content"><h3>📍 Consegna</h3><div class="pay-option" onclick="closeModals()">Usa posizione</div><button class="btn-confirm" onclick="closeModals()">OK</button></div></div>

<script>
    const PRODS = [
        { id: 1, n: "Penne Rigate 500g", p: 0.95, c: "Pasta", img: "https://unsplash.com" },
        { id: 2, n: "Acqua Naturale 1.5L", p: 0.45, c: "Bevande", img: "https://unsplash.com" },
        { id: 3, n: "Mele Golden (kg)", p: 1.20, c: "Frutta e Verdura", img: "https://unsplash.com" },
        { id: 4, n: "Fettine Bovino", p: 5.50, c: "Carne e Pesce", img: "https://unsplash.com" },
        { id: 5, n: "Latte Intero 1L", p: 1.30, c: "Latticini", img: "https://unsplash.com" },
        { id: 6, n: "Uova Bio x6", p: 2.10, c: "Uova", img: "https://unsplash.com" },
        { id: 7, n: "Pane Fresco", p: 1.50, c: "Pane", img: "https://unsplash.com" },
        { id: 8, n: "Burger Vegano", p: 2.99, c: "Vegano", img: "https://unsplash.com" },
        { id: 9, n: "Tonno Olio", p: 3.20, c: "Scatolame", img: "https://unsplash.com" },
        { id: 10, n: "Coca Cola 1.5L", p: 1.90, c: "Bevande", img: "https://unsplash.com" }
    ];

    let cart = [];

    function render(filter = 'Tutti') {
        let html = "";
        let items = filter === 'Tutti' ? PRODS : PRODS.filter(p => p.c === filter);
        items.forEach(p => {
            html += `<div class="card">
                <button class="add-btn" onclick="addToCart(${p.id})">+</button>
                <img src="${p.img}">
                <div style="font-size:13px; font-weight:bold">${p.n}</div>
                <div style="color:var(--primary); font-weight:bold">${p.p.toFixed(2)}€</div>
            </div>`;
        });
        document.getElementById('catalog').innerHTML = html;
    }

    function addToCart(id) {
        let p = PRODS.find(x => x.id === id);
        let exists = cart.find(x => x.id === id);
        if(exists) exists.q++; else cart.push({...p, q:1});
        updateUI();
    }

    function remove(id) {
        cart = cart.filter(x => x.id !== id);
        updateUI();
        if(cart.length === 0) closeModals();
    }

    function updateUI() {
        let total = 0;
        let listHtml = "";
        cart.forEach(i => {
            total += (i.p * i.q);
            listHtml += `<div class="cart-row"><span><b>${i.q}x</b> ${i.n}</span><span>${(i.p*i.q).toFixed(2)}€ <button class="btn-remove" onclick="remove(${i.id})">✕</button></span></div>`;
        });
        document.getElementById('cart-trigger').style.display = cart.length > 0 ? 'block' : 'none';
        document.getElementById('cart-total-top').innerText = total.toFixed(2) + "€";
        document.getElementById('final-price').innerText = "Totale: " + total.toFixed(2) + "€";
        document.getElementById('cart-items-list').innerHTML = listHtml;
    }

    function openCart() { document.getElementById('modalCart').style.display = 'flex'; }
    function showAddress() { document.getElementById('modalAddress').style.display = 'flex'; }
    function showPay() { if(confirm("Confermi l'ordine?")) { closeModals(); document.getElementById('modalPay').style.display = 'flex'; } }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function finish(m) { alert("Ordine inviato! Pagamento: " + m); cart = []; updateUI(); closeModals(); }

    render();
</script>
</body>
</html>
